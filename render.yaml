services:
  - type: web
    plan: free
    name: task-manager-api
    runtime: python
    buildCommand: './build.sh'
    startCommand: 'gunicorn tasks_backend.asgi:application -k uvicorn.workers.UvicornWorker'
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: WEB_CONCURRENCY
        value: 4
